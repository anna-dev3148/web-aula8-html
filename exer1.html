<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prática 1</title>
    <script>
        window.onload = inicio;

        function inicio() {
            let botao = document.getElementById('btn_calcular');
            botao.addEventListener('click', calculo);
        }

        function calculo() {
            let saida = document.getElementById('resultado');
            saida.innerHTML = calcula_Area_Circulo(4);
        }

        function calcula_Area_Circulo(raio) {
            let Area = Math.PI * (raio * raio);
            return Area;
        }
    </script>
</head>

<body>
    <h1>Aperte o botão para calcular a [área] do circulo.</h1>
    <p id="resultado"></p>
    <button id="btn_calcular">Área</button>
</body>

</html>
